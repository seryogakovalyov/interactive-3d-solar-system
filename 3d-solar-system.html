<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
    position: relative;
  }

  canvas#starfield {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  canvas#main {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    touch-action: none;
  }

  #controls {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(10, 15, 30, 0.75);
    backdrop-filter: blur(10px);
    padding: 10px 24px;
    border-radius: 30px;
    border: 1px solid rgba(100, 140, 255, 0.2);
    box-shadow: 0 0 20px rgba(50, 80, 200, 0.15);
    flex-wrap: nowrap;
    flex-shrink: 0;
    white-space: nowrap;
    width: max-content;
    min-width: 0;
  }

  .controls-top, .controls-bottom {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    flex-shrink: 0;
  }

  #controls label {
    color: #a0b8e0;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #controls label.hide-mobile {
    display: none;
  }

  #speedSlider {
    -webkit-appearance: none;
    appearance: none;
    width: 160px;
    flex-shrink: 0;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #1a2a5e, #4a7aff);
    outline: none;
    cursor: pointer;
  }

  #speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #8ab4ff, #2a4a9a);
    border: 2px solid #a0c8ff;
    box-shadow: 0 0 10px rgba(100, 160, 255, 0.5);
    cursor: pointer;
    transition: box-shadow 0.2s;
  }

  #speedSlider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 18px rgba(100, 160, 255, 0.8);
  }

  #speedValue {
    color: #c0d8ff;
    font-size: 13px;
    min-width: 140px;
    max-width: 140px;
    width: 140px;
    text-align: center;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    flex-shrink: 0;
  }

  #timeLabel {
    color: #607898;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.3px;
    min-width: 160px;
    max-width: 160px;
    width: 160px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    flex-shrink: 0;
  }

  .ctrl-btn {
    appearance: none;
    border: 1px solid rgba(120, 170, 255, 0.3);
    background: linear-gradient(180deg, rgba(35,55,100,0.85), rgba(18,25,60,0.85));
    color: #c0d8ff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(50, 90, 200, 0.12);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .ctrl-btn:hover {
    box-shadow: 0 0 16px rgba(70, 130, 255, 0.25);
    transform: translateY(-1px);
  }

  .ctrl-btn:active {
    transform: translateY(0);
  }

  .ctrl-btn.active {
    background: linear-gradient(180deg, rgba(50,80,160,0.9), rgba(25,40,90,0.9));
    border-color: rgba(130, 180, 255, 0.45);
  }

@media (max-width: 900px) {
  #controls {
    top: 18px;
    width: min(calc(100vw - 32px), 620px);
    padding: 12px 14px 14px;
    gap: 12px;
    border-radius: 24px;
    flex-direction: column;
    align-items: stretch;
  }

  .controls-top {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 8px 12px;
    width: 100%;
  }

  .controls-bottom {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  #speedValue {
    width: auto;
    min-width: 92px;
    max-width: none;
    font-size: 13px;
    text-align: left;
  }

  #speedSlider {
    width: 100%;
    min-width: 0;
  }

  #timeLabel {
    grid-column: 1 / -1;
    width: auto;
    min-width: 0;
    max-width: none;
    font-size: 10px;
    text-align: right;
    opacity: 0.75;
  }

  .ctrl-btn,
  #nowBtn,
  #pauseBtn,
  #playBtn {
    min-height: 40px;
    padding: 0 16px;
    font-size: 13px;
  }

  #controls label {
    display: none;
  }
}

@media (max-width: 500px) {
  #controls {
    top: 14px;
    width: calc(100vw - 28px);
    padding: 12px 12px 14px;
    gap: 12px;
  }

  .controls-top {
    gap: 8px 10px;
  }

  .controls-bottom {
    gap: 8px;
  }

  #speedValue {
    min-width: 86px;
    font-size: 12px;
  }

  #timeLabel {
    font-size: 9px;
  }

  .ctrl-btn,
  #nowBtn,
  #pauseBtn,
  #playBtn {
    flex: 1;
    min-height: 42px;
    padding: 0 10px;
    font-size: 13px;
  }

  .ctrl-btn {
    touch-action: manipulation;
  }

  #speedSlider::-webkit-slider-thumb {
    width: 22px;
    height: 22px;
  }
}

  #planetInfo {
    position: absolute;
    z-index: 10;
    background: rgba(8, 12, 30, 0.88);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(80, 120, 255, 0.25);
    border-radius: 16px;
    padding: 20px 24px;
    color: #fff;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -100%) translateY(-20px) scale(0.9);
    transition: opacity 0.35s ease, transform 0.35s ease;
    min-width: 250px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 40px rgba(50, 80, 200, 0.1);
  }

  #planetInfo.visible {
    opacity: 1;
    transform: translate(-50%, -100%) translateY(-16px) scale(1);
    pointer-events: auto;
  }

  #planetInfo h2 {
    margin: 0 0 10px 0;
    font-size: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  #planetInfo .stat {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #planetInfo .stat .label { color: #7890b8; }
  #planetInfo .stat .value {
    color: #c0d8ff;
    font-weight: 600;
    text-align: right;
    max-width: 60%;
    word-wrap: break-word;
    white-space: normal;
  }

  .planet-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 6px currentColor;
  }

  #interactionHints {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    width: calc(100% - 32px);
    flex-direction: column;
    align-items: center;
    gap: 7px;
    text-align: center;
    pointer-events: none;
  }

  #zoomHint {
    color: rgba(120, 150, 200, 0.35);
    font-size: 11px;
    letter-spacing: 2px;
    line-height: 1.4;
  }

  #resetHint {
    color: rgba(120, 150, 200, 0.25);
    font-size: 10px;
    letter-spacing: 1.5px;
    line-height: 1.4;
  }

  #title {
    color: rgba(120, 150, 200, 0.4);
    font-size: 11px;
    letter-spacing: 3px;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .mobile-hint {
    display: none;
  }

  @media (max-width: 600px), (pointer: coarse) {
    #interactionHints {
      bottom: max(14px, env(safe-area-inset-bottom));
      gap: 5px;
    }

    #title {
      font-size: 10px;
      letter-spacing: 2px;
    }

    #resetHint,
    #zoomHint {
      max-width: 100%;
      font-size: 9px;
      letter-spacing: 1px;
      line-height: 1.5;
    }

    .desktop-hint {
      display: none;
    }

    .mobile-hint {
      display: inline;
    }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<canvas id="main"></canvas>

<div id="controls">
  <div class="controls-top">
    <span id="speedValue">LIVE</span>
    <label class="hide-mobile">Speed</label>
    <input type="range" id="speedSlider" min="0" max="18000" value="100">
    <span id="timeLabel">&nbsp;</span>
  </div>
  <div class="controls-bottom">
    <button id="nowBtn" type="button" class="ctrl-btn active">Now</button>
    <button id="pauseBtn" type="button" class="ctrl-btn">Pause</button>
    <button id="playBtn" type="button" class="ctrl-btn">Play</button>
  </div>
</div>

<div id="planetInfo">
  <h2 id="infoName"></h2>
  <div class="stat"><span class="label">Diameter</span><span class="value" id="infoDiameter"></span></div>
  <div class="stat"><span class="label">Distance</span><span class="value" id="infoDistance"></span></div>
  <div class="stat"><span class="label">Orbital Period</span><span class="value" id="infoPeriod"></span></div>
  <div class="stat"><span class="label">Type</span><span class="value" id="infoType"></span></div>
  <div class="stat"><span class="label">Moons</span><span class="value" id="infoMoons"></span></div>
</div>

<div id="interactionHints">
  <div id="title">Interactive 3D Solar System</div>
  <div id="resetHint">
    <span class="desktop-hint">Click a planet to inspect · Drag to rotate</span>
    <span class="mobile-hint">Tap a planet to inspect · One-finger drag to rotate</span>
  </div>
  <div id="zoomHint">
    <span class="desktop-hint">Scroll to zoom · Shift/right-drag to pan</span>
    <span class="mobile-hint">Two-finger drag to pan · Pinch to zoom · Double-tap empty space to reset</span>
  </div>
</div>

<script>
// ==================== SETUP ====================
const starCanvas = document.getElementById('starfield');
const starCtx = starCanvas.getContext('2d');

const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
const infoPanel = document.getElementById('planetInfo');
const speedSlider = document.getElementById('speedSlider');
const speedValueEl = document.getElementById('speedValue');
const timeLabelEl = document.getElementById('timeLabel');
const nowBtn = document.getElementById('nowBtn');
const pauseBtn = document.getElementById('pauseBtn');
const playBtn = document.getElementById('playBtn');

function resizeCanvases() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  starCanvas.width = w;
  starCanvas.height = h;
  canvas.width = w;
  canvas.height = h;
}
resizeCanvases();
window.addEventListener('resize', () => {
  resizeCanvases();
  clampPan();
});

// ==================== STARFIELD ====================
const stars = [];
function rebuildStars() {
  stars.length = 0;
  const count = Math.max(500, Math.floor((canvas.width * canvas.height) / 2600));
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      brightness: Math.random(),
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}
rebuildStars();
window.addEventListener('resize', rebuildStars);

function drawStarfield(time) {
  starCtx.fillStyle = 'rgba(0,0,0,1)';
  starCtx.fillRect(0, 0, canvas.width, canvas.height);

  const grd = starCtx.createRadialGradient(canvas.width/2, canvas.height/2, 80, canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height)*0.7);
  grd.addColorStop(0, '#0a0e1a');
  grd.addColorStop(0.5, '#050810');
  grd.addColorStop(1, '#010208');
  starCtx.fillStyle = grd;
  starCtx.fillRect(0, 0, canvas.width, canvas.height);

  for (const s of stars) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    const alpha = s.brightness * 0.4 + twinkle * 0.6;
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    starCtx.fillStyle = `rgba(220,230,255,${alpha})`;
    starCtx.fill();

    if (s.r > 1.2) {
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      starCtx.fillStyle = `rgba(200,220,255,${alpha * 0.1})`;
      starCtx.fill();
    }
  }


}

// ==================== TIME MODEL ====================
const EPOCH_MS = Date.UTC(2026, 5, 25, 0, 0, 0);

let simTime = Date.now();
let liveMode = true;
let simSpeed = 1;
let isPaused = false;

const PHASES_2026 = {
  Mercury: 4.037,
  Venus:   3.438,
  Earth:   4.761,
  Mars:    0.412,
  Jupiter: 2.059,
  Saturn:  0.238,
  Uranus:  1.164,
  Neptune: 0.048
};

function getPlanetAngle(planet, timeMs) {
  const daysSinceEpoch = (timeMs - EPOCH_MS) / 86400000;
  const phase = planet.phaseAtEpoch ?? 0;
  return phase + (daysSinceEpoch / planet.periodDays) * Math.PI * 2;
}

function formatSimTime(ms) {
  const d = new Date(ms);
  return d.toLocaleString();
}

// ==================== MOON SYSTEMS ====================
const MOON_SYSTEMS = {
  Earth: [
    { name:'Moon', periodDays:27.321661, orbitRadiusFactor:2.0, radius:2.6, color:'#d8d8cf', phaseOffset:1.2 }
  ],
  Jupiter: [
    { name:'Io', periodDays:1.769, orbitRadiusFactor:1.55, radius:1.8, color:'#f1d27a', phaseOffset:0.4 },
    { name:'Europa', periodDays:3.551, orbitRadiusFactor:1.95, radius:1.7, color:'#d8d0b0', phaseOffset:2.1 },
    { name:'Ganymede', periodDays:7.155, orbitRadiusFactor:2.45, radius:2.1, color:'#9f9a90', phaseOffset:4.0 },
    { name:'Callisto', periodDays:16.689, orbitRadiusFactor:3.05, radius:2.0, color:'#7f7468', phaseOffset:5.4 }
  ],
  Saturn: [
    { name:'Enceladus', periodDays:1.370, orbitRadiusFactor:1.65, radius:1.4, color:'#f4f6ff', phaseOffset:0.7 },
    { name:'Rhea', periodDays:4.518, orbitRadiusFactor:2.15, radius:1.8, color:'#c9c3b8', phaseOffset:2.3 },
    { name:'Titan', periodDays:15.945, orbitRadiusFactor:2.85, radius:2.5, color:'#d2a86f', phaseOffset:4.8 },
    { name:'Iapetus', periodDays:79.321, orbitRadiusFactor:4.0, radius:1.7, color:'#b6ab96', phaseOffset:1.5 }
  ],
  Uranus: [
    { name:'Miranda', periodDays:1.413, orbitRadiusFactor:1.55, radius:1.2, color:'#c9c3bd', phaseOffset:0.8 },
    { name:'Ariel', periodDays:2.520, orbitRadiusFactor:1.9, radius:1.4, color:'#d9d7d2', phaseOffset:2.2 },
    { name:'Umbriel', periodDays:4.144, orbitRadiusFactor:2.3, radius:1.5, color:'#8f8d91', phaseOffset:4.0 },
    { name:'Titania', periodDays:8.706, orbitRadiusFactor:2.85, radius:1.9, color:'#c7bfb5', phaseOffset:5.2 },
    { name:'Oberon', periodDays:13.463, orbitRadiusFactor:3.3, radius:1.8, color:'#9a948c', phaseOffset:1.9 }
  ],
  Neptune: [
    { name:'Triton', periodDays:-5.877, orbitRadiusFactor:2.0, radius:2.2, color:'#d8cfc9', phaseOffset:1.7 },
    { name:'Proteus', periodDays:1.122, orbitRadiusFactor:1.45, radius:1.2, color:'#8f847c', phaseOffset:4.6 }
  ]
};

// ==================== PLANET DATA ====================
const planets = [
  { name:'Mercury', color:'#a89d8f', radius:3.5, orbitRadius:70, diameter:'4,879 km', distance:'57.9M km', period:'88 days', type:'Rocky', tilt:0.03, glowColor:'rgba(176,168,144,0.20)', periodDays:87.969, phaseAtEpoch:PHASES_2026.Mercury },
  { name:'Venus',   color:'#d8b76f', radius:6.2, orbitRadius:100, diameter:'12,104 km', distance:'108.2M km', period:'225 days', type:'Rocky', tilt:0.05, glowColor:'rgba(232,200,122,0.22)', periodDays:224.701, phaseAtEpoch:PHASES_2026.Venus },
  { name:'Earth',   color:'#4a90d9', radius:6.6, orbitRadius:135, diameter:'12,742 km', distance:'149.6M km', period:'365.25 days', type:'Rocky', tilt:0.25, glowColor:'rgba(74,144,217,0.28)', hasMoon:true, periodDays:365.256, phaseAtEpoch:PHASES_2026.Earth },
  { name:'Mars',    color:'#c95a3b', radius:5.0, orbitRadius:175, diameter:'6,779 km', distance:'227.9M km', period:'687 days', type:'Rocky', tilt:0.15, glowColor:'rgba(212,90,58,0.22)', periodDays:686.98, phaseAtEpoch:PHASES_2026.Mars },
  { name:'Jupiter', color:'#c89463', radius:15.5, orbitRadius:245, diameter:'139,820 km', distance:'778.5M km', period:'11.86 years', type:'Gas Giant', tilt:0.12, glowColor:'rgba(212,160,106,0.22)', bands:true, moons:4, periodDays:4332.59, phaseAtEpoch:PHASES_2026.Jupiter },
  { name:'Saturn',  color:'#dbc37f', radius:13.5, orbitRadius:315, diameter:'116,460 km', distance:'1.43B km', period:'29.46 years', type:'Gas Giant', tilt:0.18, glowColor:'rgba(232,208,136,0.20)', rings:true, moons:3, periodDays:10759.22, phaseAtEpoch:PHASES_2026.Saturn },
  { name:'Uranus',  color:'#7ec8d8', radius:10.2, orbitRadius:385, diameter:'50,724 km', distance:'2.87B km', period:'84.01 years', type:'Ice Giant', tilt:0.45, glowColor:'rgba(126,200,216,0.18)', periodDays:30688.5, phaseAtEpoch:PHASES_2026.Uranus },
  { name:'Neptune', color:'#4a6ae0', radius:10.0, orbitRadius:450, diameter:'49,244 km', distance:'4.50B km', period:'164.8 years', type:'Ice Giant', tilt:0.1, glowColor:'rgba(74,106,224,0.20)', periodDays:60182, phaseAtEpoch:PHASES_2026.Neptune }
];

planets.forEach(p => {
  p.angle = getPlanetAngle(p, simTime);
  p.clickAnim = 0;
  p.hovered = false;
  p._screenX = 0;
  p._screenY = 0;
  p._depth = 0;
  p._screenR = p.radius;
});

// ==================== MAIN ASTEROID BELT ====================
const ASTEROID_COUNT = 360;
const asteroidBelt = [];
const asteroidColors = [
  [142, 134, 124],
  [126, 119, 112],
  [111, 113, 116],
  [151, 137, 119],
  [103, 100, 98]
];

for (let i = 0; i < ASTEROID_COUNT; i++) {
  const radialMix = (Math.random() + Math.random()) * 0.5;
  const orbitRadius = 198 + radialMix * 34;
  const radiusProgress = (orbitRadius - 198) / 34;
  const clusterAngle = (i % 7) / 7 * Math.PI * 2;
  const useCluster = Math.random() < 0.28;
  const phaseAtEpoch = useCluster
    ? clusterAngle + (Math.random() - 0.5) * 0.5
    : Math.random() * Math.PI * 2;
  const size = 0.6 + Math.pow(Math.random(), 2.1) * 1.2;
  const brightness = 0.42 + Math.random() * 0.34;
  const baseColor = asteroidColors[Math.floor(Math.random() * asteroidColors.length)];

  asteroidBelt.push({
    orbitRadius,
    phaseAtEpoch,
    periodDays: (1250 + radiusProgress * 1050) * (0.94 + Math.random() * 0.12),
    eccentricity: Math.random() * 0.025,
    eccentricityAngle: Math.random() * Math.PI * 2,
    size,
    color: `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},${brightness})`,
    glowColor: `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},${brightness * 0.14})`,
    bright: size > 1.45 && Math.random() < 0.55
  });
}

// ==================== CAMERA ====================
let cameraTilt = 0.68;
let cameraRotY = 0;
let cameraZoom = 1.15;
let cameraPanX = 0;
let cameraPanY = 0;
let targetTilt = 0.68;
let targetRotY = 0;
let targetZoom = 1.15;
let targetPanX = 0;
let targetPanY = 0;
let isDragging = false;
let dragMode = null;
let lastMouse = { x: 0, y: 0 };
let mouseDragDistance = 0;
let hoveredPlanet = null;
let selectedPlanet = null;

function resetCamera() {
  targetTilt = 0.68;
  targetRotY = 0;
  targetZoom = 1.15;
  targetPanX = 0;
  targetPanY = 0;
}

function clampPan() {
  const maxPanX = canvas.width * 0.45;
  const maxPanY = canvas.height * 0.35;
  targetPanX = Math.max(-maxPanX, Math.min(maxPanX, targetPanX));
  targetPanY = Math.max(-maxPanY, Math.min(maxPanY, targetPanY));
}

function clampZoom() {
  targetZoom = Math.max(0.3, Math.min(2.5, targetZoom));
}

// ==================== FIX: getPlanetScreenPos ====================
function getPlanetScreenPos(cx, cy, orbitR, angle) {
  const cosTilt = Math.cos(cameraTilt);
  const sinRot = Math.sin(cameraRotY);
  const cosRot = Math.cos(cameraRotY);

  const ox = Math.cos(angle);
  const oz = Math.sin(angle);

  // Rotation around Y axis
  const rx = ox * cosRot - oz * sinRot;
  const rz = ox * sinRot + oz * cosRot;

  // === КРИТИЧЕСКИЙ ФАКСОР: умножаем на orbitR! ===
  const sx = cx + rx * orbitR;
  const sy = cy + rz * orbitR * cosTilt;

  const depth = rz * orbitR;
  const depthScale = 1 + rz * 0.12;

  return { x: sx, y: sy, depth, scale: depthScale };
}

// ==================== DRAWING ====================
function drawSun(cx, cy, time) {
  const glowLayers = [
    { r: 90, alpha: 0.015 },
    { r: 65, alpha: 0.035 },
    { r: 48, alpha: 0.055 },
    { r: 36, alpha: 0.08 },
  ];

  for (const g of glowLayers) {
    const pulse = 1 + 0.05 * Math.sin(time * 0.003);
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, g.r * pulse * cameraZoom);
    grad.addColorStop(0, `rgba(255,200,50,${g.alpha})`);
    grad.addColorStop(0.5, `rgba(255,140,20,${g.alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, g.r * pulse * cameraZoom, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Corona rays
  ctx.save();
  ctx.translate(cx, cy);
  const rayCount = 16;
  for (let i = 0; i < rayCount; i++) {
    const angle = (i / rayCount) * Math.PI * 2 + time * 0.0005;
    const rayLen = (55 + 18 * Math.sin(time * 0.002 + i * 1.5)) * cameraZoom;
    ctx.rotate(angle);
    const rayGrad = ctx.createLinearGradient(22 * cameraZoom, 0, rayLen, 0);
    rayGrad.addColorStop(0, 'rgba(255,200,80,0.12)');
    rayGrad.addColorStop(1, 'rgba(255,120,0,0)');
    ctx.fillStyle = rayGrad;
    ctx.beginPath();
    ctx.moveTo(22 * cameraZoom, -1.5 * cameraZoom);
    ctx.lineTo(rayLen, 0);
    ctx.lineTo(22 * cameraZoom, 1.5 * cameraZoom);
    ctx.fill();
    ctx.rotate(-angle);
  }
  ctx.restore();

  // Main sun body
  const sunPulse = 1 + 0.02 * Math.sin(time * 0.004);
  const sunR = 30 * sunPulse * cameraZoom;
  const sunGrad = ctx.createRadialGradient(cx - 5, cy - 5, 2, cx, cy, sunR);
  sunGrad.addColorStop(0, '#fff8e0');
  sunGrad.addColorStop(0.3, '#ffe44d');
  sunGrad.addColorStop(0.7, '#ffaa00');
  sunGrad.addColorStop(1, '#ff6600');
  ctx.beginPath();
  ctx.arc(cx, cy, sunR, 0, Math.PI * 2);
  ctx.fillStyle = sunGrad;
  ctx.fill();

  const coreGrad = ctx.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, sunR * 0.6);
  coreGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
  coreGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, sunR * 0.6, 0, Math.PI * 2);
  ctx.fillStyle = coreGrad;
  ctx.fill();
}

function drawOrbitPath(cx, cy, orbitR, color) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, orbitR, orbitR * Math.cos(cameraTilt), 0, 0, Math.PI * 2);
  ctx.strokeStyle = color || 'rgba(60,80,120,0.18)';
  ctx.lineWidth = 1 * cameraZoom;
  ctx.stroke();
}

function lightenColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

function darkenColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - amount);
  const g = Math.max(0, ((num >> 8) & 0xff) - amount);
  const b = Math.max(0, (num & 0xff) - amount);
  return `rgb(${r},${g},${b})`;
}

function drawPlanet(planet, cx, cy, time) {
  const pos = { x: planet._screenX, y: planet._screenY, depth: planet._depth, scale: planet._screenScale || 1 };
  const r = planet._screenR || (planet.radius * pos.scale * cameraZoom);

  if (planet.clickAnim > 0) {
    planet.clickAnim -= 0.02;
  }

  // Glow
  const glowGrad = ctx.createRadialGradient(pos.x, pos.y, r * 0.5, pos.x, pos.y, r * 3);
  glowGrad.addColorStop(0, planet.glowColor);
  glowGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r * 3, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();

  // Saturn rings — back (above planet), body, front (below planet)
  if (planet.rings) {
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.scale(1, Math.cos(cameraTilt) * 0.35);

    const ringConfigs = [
      { inner: r * 1.35, outer: r * 1.95, color: 'rgba(210,190,140,0.5)' },
      { inner: r * 2.05, outer: r * 2.45, color: 'rgba(190,170,120,0.3)' },
      { inner: r * 2.5, outer: r * 2.75, color: 'rgba(180,160,110,0.18)' }
    ];

    // Back rings (upper half)
    for (const ring of ringConfigs) {
      ctx.beginPath();
      ctx.ellipse(0, 0, ring.outer, ring.outer * 0.28, 0, Math.PI, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth = (ring.outer - ring.inner);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Planet body gradient
  const bodyGrad = ctx.createRadialGradient(
    pos.x - r * 0.3, pos.y - r * 0.3, r * 0.1,
    pos.x, pos.y, r
  );
  const baseColor = planet.color;
  bodyGrad.addColorStop(0, lightenColor(baseColor, 40));
  bodyGrad.addColorStop(0.6, baseColor);
  bodyGrad.addColorStop(1, darkenColor(baseColor, 50));

  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Saturn rings — front (lower half)
  if (planet.rings) {
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.scale(1, Math.cos(cameraTilt) * 0.35);

    const ringConfigs = [
      { inner: r * 1.35, outer: r * 1.95, color: 'rgba(210,190,140,0.5)' },
      { inner: r * 2.05, outer: r * 2.45, color: 'rgba(190,170,120,0.3)' },
      { inner: r * 2.5, outer: r * 2.75, color: 'rgba(180,160,110,0.18)' }
    ];

    for (const ring of ringConfigs) {
      ctx.beginPath();
      ctx.ellipse(0, 0, ring.outer, ring.outer * 0.28, 0, 0, Math.PI);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth = (ring.outer - ring.inner);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Jupiter bands
  if (planet.bands) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.clip();
    const bandColors = ['rgba(180,130,80,0.3)', 'rgba(200,160,100,0.2)', 'rgba(160,100,60,0.3)'];
    for (let i = -3; i <= 3; i++) {
      ctx.fillStyle = bandColors[Math.abs(i) % 3];
      ctx.fillRect(pos.x - r, pos.y + i * r * 0.25 - r * 0.06, r * 2, r * 0.12);
    }
    ctx.beginPath();
    ctx.ellipse(pos.x + r * 0.3, pos.y + r * 0.2, r * 0.2, r * 0.12, 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,80,50,0.5)';
    ctx.fill();
    ctx.restore();
  }

  // Earth features
  if (planet.name === 'Earth') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(60,150,60,0.35)';
    ctx.beginPath();
    ctx.ellipse(pos.x - r * 0.2, pos.y - r * 0.1, r * 0.35, r * 0.25, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(50,140,50,0.3)';
    ctx.beginPath();
    ctx.ellipse(pos.x + r * 0.3, pos.y + r * 0.2, r * 0.2, r * 0.3, -0.2, 0, Math.PI * 2);
    ctx.fill();
    const atmosGrad = ctx.createRadialGradient(pos.x, pos.y, r * 0.85, pos.x, pos.y, r * 1.15);
    atmosGrad.addColorStop(0, 'rgba(100,180,255,0)');
    atmosGrad.addColorStop(1, 'rgba(100,180,255,0.15)');
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r * 1.15, 0, Math.PI * 2);
    ctx.fillStyle = atmosGrad;
    ctx.fill();
    ctx.restore();
  }

  // Mars polar caps
  if (planet.name === 'Mars') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y - r * 0.7, r * 0.4, r * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y + r * 0.75, r * 0.3, r * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Specular highlight
  const specGrad = ctx.createRadialGradient(
    pos.x - r * 0.35, pos.y - r * 0.35, 0,
    pos.x - r * 0.35, pos.y - r * 0.35, r * 0.6
  );
  specGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fillStyle = specGrad;
  ctx.fill();

  // Click ripple
  if (planet.clickAnim > 0) {
    const rippleR = r + (1 - planet.clickAnim) * 30 * cameraZoom;
    const rippleAlpha = planet.clickAnim * 0.5;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, rippleR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${rippleAlpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Hover ring
  if (planet.hovered) {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Name label
  ctx.font = `${Math.max(8, Math.round(10 * cameraZoom))}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = `rgba(180,200,230,${0.4 + (cameraZoom - 0.5) * 0.3})`;
  ctx.textAlign = 'center';
  ctx.fillText(planet.name, pos.x, pos.y + r + 14 * cameraZoom);

}

// ==================== MOONS / DEPTH HELPERS ====================


function drawMoonObject(moon) {
  ctx.beginPath();
  ctx.arc(moon.x, moon.y, moon.r, 0, Math.PI * 2);

  if (moon.gradStops) {
    const mg = ctx.createRadialGradient(
      moon.x - moon.r * 0.35,
      moon.y - moon.r * 0.35,
      0,
      moon.x,
      moon.y,
      moon.r
    );
    mg.addColorStop(0, moon.gradStops[0]);
    mg.addColorStop(1, moon.gradStops[1]);
    ctx.fillStyle = mg;
  } else {
    ctx.fillStyle = moon.color;
  }

  ctx.fill();
}

function buildMoonBodies() {
  const bodies = [];
  const daysSinceEpoch = (simTime - EPOCH_MS) / 86400000;

  for (const planet of planets) {
    const moonDefs = MOON_SYSTEMS[planet.name];
    if (!moonDefs) continue;

    const px = planet._screenX;
    const py = planet._screenY;
    const pr = planet._screenR;
    const pDepth = planet._depth;

    for (const moonDef of moonDefs) {
      const moonOrbit = pr * moonDef.orbitRadiusFactor + 6 * cameraZoom;
      const moonAngle = (daysSinceEpoch / moonDef.periodDays) * Math.PI * 2 + moonDef.phaseOffset;

      const localX = Math.cos(moonAngle) * moonOrbit;
      const localZ = Math.sin(moonAngle) * moonOrbit;
      const localY = localZ * Math.cos(cameraTilt);

      const moon = {
        x: px + localX,
        y: py + localY,
        depth: pDepth + localZ,
        r: Math.max(moonDef.radius * cameraZoom, 1),
        color: moonDef.color
      };

      bodies.push({
        type: 'moon',
        depth: moon.depth,
        draw: () => drawMoonObject(moon)
      });
    }
  }

  return bodies;
}

function drawAsteroidObject(asteroid) {
  if (asteroid.bright) {
    ctx.beginPath();
    ctx.arc(asteroid.x, asteroid.y, asteroid.r * 2.4, 0, Math.PI * 2);
    ctx.fillStyle = asteroid.glowColor;
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(asteroid.x, asteroid.y, asteroid.r, 0, Math.PI * 2);
  ctx.fillStyle = asteroid.color;
  ctx.fill();
}

function buildAsteroidBodies(cx, cy) {
  const bodies = [];
  const daysSinceEpoch = (simTime - EPOCH_MS) / 86400000;

  for (const asteroid of asteroidBelt) {
    const angle = asteroid.phaseAtEpoch +
      (daysSinceEpoch / asteroid.periodDays) * Math.PI * 2;
    const orbitalVariation = 1 +
      asteroid.eccentricity * Math.cos(angle - asteroid.eccentricityAngle);
    const orbitRadius = asteroid.orbitRadius * orbitalVariation * cameraZoom;
    const pos = getPlanetScreenPos(cx, cy, orbitRadius, angle);
    const projectedAsteroid = {
      x: pos.x,
      y: pos.y,
      r: Math.max(0.35, asteroid.size * pos.scale * cameraZoom),
      color: asteroid.color,
      glowColor: asteroid.glowColor,
      bright: asteroid.bright
    };

    bodies.push({
      type: 'asteroid',
      depth: pos.depth,
      draw: () => drawAsteroidObject(projectedAsteroid)
    });
  }

  return bodies;
}

// ==================== MAIN LOOP ====================
let _time = 0;

function update(dt) {
  if (liveMode) {
    simTime = Date.now();
    speedValueEl.textContent = 'LIVE';
  } else if (isPaused) {
    speedValueEl.textContent = 'PAUSED';
  } else {
    const rawSpeed = parseFloat(speedSlider.value);
    simSpeed = Math.max(0, rawSpeed / 100);
    simTime += (dt / 1000) * simSpeed * 86400000;
    const label = (simSpeed >= 100 ? Math.round(simSpeed) : simSpeed.toFixed(1)) + ' days/sec';
    speedValueEl.textContent = label;
  }

  for (const p of planets) {
    p.angle = getPlanetAngle(p, simTime);
  }

  // Earth's moon phase offset — angle relative to Earth-Sun line
  // (not used here, but computed in buildMoonBodies)

  cameraTilt += (targetTilt - cameraTilt) * 0.08;
  cameraRotY += (targetRotY - cameraRotY) * 0.08;
  cameraZoom += (targetZoom - cameraZoom) * 0.1;
  cameraPanX += (targetPanX - cameraPanX) * 0.12;
  cameraPanY += (targetPanY - cameraPanY) * 0.12;
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2 + cameraPanX;
  const cy = canvas.height / 2 + cameraPanY;

  // 1. Compute all planet screen positions/depths first.
  for (const p of planets) {
    const pos = getPlanetScreenPos(cx, cy, p.orbitRadius * cameraZoom, p.angle);
    p._screenX = pos.x;
    p._screenY = pos.y;
    p._depth = pos.depth;
    p._screenScale = pos.scale;
    p._screenR = p.radius * pos.scale * cameraZoom;
  }

  // 2. Orbits are background guides, so draw them before bodies.
  for (const p of planets) {
    drawOrbitPath(cx, cy, p.orbitRadius * cameraZoom, 'rgba(50,70,110,0.16)');
  }

  // 3. Sun, planets, moons and asteroids must be in ONE depth-sorted list.
  // In this projection positive depth is closer to the camera.
  const sceneBodies = [
    { type: 'sun', depth: 0, draw: () => drawSun(cx, cy, _time) },
    ...planets.map(p => ({
      type: 'planet',
      depth: p._depth,
      draw: () => drawPlanet(p, cx, cy, _time)
    })),
    ...buildMoonBodies(),
    ...buildAsteroidBodies(cx, cy)
  ];

  // Far first, near last.
  sceneBodies.sort((a, b) => a.depth - b.depth);

  for (const body of sceneBodies) {
    body.draw();
  }

  // UI overlay above the scene.
  if (selectedPlanet) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(selectedPlanet._screenX, selectedPlanet._screenY);
    ctx.strokeStyle = 'rgba(100,150,255,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Moon orbits for selected planet
    const moonDefs = MOON_SYSTEMS[selectedPlanet.name];
    if (moonDefs) {
      for (const moonDef of moonDefs) {
        const moonOrbitR = selectedPlanet._screenR * moonDef.orbitRadiusFactor + 6 * cameraZoom;
        ctx.beginPath();
        ctx.ellipse(selectedPlanet._screenX, selectedPlanet._screenY,
          moonOrbitR, moonOrbitR * Math.cos(cameraTilt), 0, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(100,160,255,0.12)';
        ctx.lineWidth = 0.5 * cameraZoom;
        ctx.stroke();
      }
    }
  }
}

function animate(timestamp) {
  if (animate.lastTime == null) animate.lastTime = timestamp;
  let dt = timestamp - animate.lastTime;
  if (dt > 100) dt = 16.67;
  dt = Math.max(0, Math.min(dt, 33));

  _time = timestamp;
  animate.lastTime = timestamp;

  update(dt);
  drawStarfield(timestamp);
  render();

  // Update time label
  if (liveMode) {
    timeLabelEl.textContent = new Date().toLocaleString();
  } else if (simSpeed === 0) {
    timeLabelEl.textContent = formatSimTime(simTime);
  } else {
    timeLabelEl.textContent = formatSimTime(simTime);
  }

  requestAnimationFrame(animate);
}

// ==================== INTERACTION ====================
canvas.addEventListener('click', (e) => {
  if (mouseDragDistance > 4) {
    mouseDragDistance = 0;
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  let clicked = null;
  let minDist = Infinity;

  for (const p of planets) {
    const dx = mx - p._screenX;
    const dy = my - p._screenY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitR = Math.max(p._screenR + 10, 18);
    if (dist < hitR && dist < minDist) {
      minDist = dist;
      clicked = p;
    }
  }

  if (clicked) {
    selectedPlanet = clicked;
    clicked.clickAnim = 1;
    showPlanetInfo(clicked);
  } else {
    selectedPlanet = null;
    hidePlanetInfo();
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  let found = false;
  for (const p of planets) {
    p.hovered = false;
    const dx = mx - p._screenX;
    const dy = my - p._screenY;
    if (Math.sqrt(dx * dx + dy * dy) < Math.max(p._screenR + 8, 15)) {
      p.hovered = true;
      canvas.style.cursor = 'pointer';
      found = true;
    }
  }
  if (!found) canvas.style.cursor = 'default';

  if (isDragging) {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    mouseDragDistance += Math.sqrt(dx * dx + dy * dy);

    if (dragMode === 'pan') {
      targetPanX += dx * scaleX;
      targetPanY += dy * scaleY;
      clampPan();
      canvas.style.cursor = 'grabbing';
    } else {
      targetRotY += dx * 0.005;
      targetTilt = Math.max(0.05, Math.min(1.3, targetTilt + dy * 0.003));
      canvas.style.cursor = 'grabbing';
    }

    lastMouse = { x: e.clientX, y: e.clientY };
  }
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0 || e.button === 2) {
    isDragging = true;
    dragMode = e.button === 2 || e.shiftKey ? 'pan' : 'rotate';
    lastMouse = { x: e.clientX, y: e.clientY };
    mouseDragDistance = 0;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  dragMode = null;
  canvas.style.cursor = planets.some(p => p.hovered) ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  dragMode = null;
  canvas.style.cursor = 'default';
});
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Zoom with mouse wheel
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = -e.deltaY * 0.001;
  targetZoom += delta;
  clampZoom();
}, { passive: false });

// Touch support
let touchStartPos = null;
let touchHasMoved = false;
let touchMode = null;
let touchMidpoint = null;
let touchDistance = 0;
let touchGestureHadMultipleFingers = false;
let lastEmptyTapTime = 0;
let lastEmptyTapPos = null;

function getTouchMidpoint(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2
  };
}

function getTouchDistance(touches) {
  const dx = touches[1].clientX - touches[0].clientX;
  const dy = touches[1].clientY - touches[0].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getPlanetAtTouch(touch) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (touch.clientX - rect.left) * scaleX;
  const my = (touch.clientY - rect.top) * scaleY;

  let hitPlanet = null;
  let minDist = Infinity;
  for (const p of planets) {
    const dx = mx - p._screenX;
    const dy = my - p._screenY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < Math.max(p._screenR + 15, 20) && dist < minDist) {
      hitPlanet = p;
      minDist = dist;
    }
  }
  return hitPlanet;
}

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length >= 2) {
    touchMode = 'panZoom';
    touchMidpoint = getTouchMidpoint(e.touches);
    touchDistance = getTouchDistance(e.touches);
    touchHasMoved = true;
    touchGestureHadMultipleFingers = true;
    isDragging = false;
  } else if (e.touches.length === 1) {
    const touch = e.touches[0];
    touchMode = 'rotate';
    touchStartPos = { x: touch.clientX, y: touch.clientY };
    touchHasMoved = false;
    touchGestureHadMultipleFingers = false;
    isDragging = true;
    lastMouse = { x: touch.clientX, y: touch.clientY };
  }

  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length >= 2 && touchMode === 'panZoom') {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const nextMidpoint = getTouchMidpoint(e.touches);
    const nextDistance = getTouchDistance(e.touches);

    targetPanX += (nextMidpoint.x - touchMidpoint.x) * scaleX;
    targetPanY += (nextMidpoint.y - touchMidpoint.y) * scaleY;
    clampPan();

    if (touchDistance > 0) {
      targetZoom *= nextDistance / touchDistance;
      clampZoom();
    }

    touchMidpoint = nextMidpoint;
    touchDistance = nextDistance;
    touchHasMoved = true;
  } else if (e.touches.length === 1 && touchMode === 'rotate') {
    const touch = e.touches[0];
    const dx = touch.clientX - lastMouse.x;
    const dy = touch.clientY - lastMouse.y;

    if (touchStartPos) {
      const totalDx = touch.clientX - touchStartPos.x;
      const totalDy = touch.clientY - touchStartPos.y;
      if (Math.sqrt(totalDx * totalDx + totalDy * totalDy) > 6) {
        touchHasMoved = true;
      }
    }

    targetRotY += dx * 0.005;
    targetTilt = Math.max(0.05, Math.min(1.3, targetTilt + dy * 0.003));
    lastMouse = { x: touch.clientX, y: touch.clientY };
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (touchMode === 'panZoom' && e.touches.length < 2) {
    touchMode = null;
    touchHasMoved = true;
    isDragging = false;
  }

  if (e.touches.length === 0) {
    const wasTap = touchMode === 'rotate' &&
      !touchHasMoved &&
      !touchGestureHadMultipleFingers;

    if (wasTap) {
      const touch = e.changedTouches[0];
      const hitPlanet = getPlanetAtTouch(touch);

      if (hitPlanet) {
        selectedPlanet = hitPlanet;
        hitPlanet.clickAnim = 1;
        showPlanetInfo(hitPlanet);
        lastEmptyTapTime = 0;
        lastEmptyTapPos = null;
      } else {
        selectedPlanet = null;
        hidePlanetInfo();

        const now = performance.now();
        const isCloseToLastTap = lastEmptyTapPos &&
          Math.hypot(
            touch.clientX - lastEmptyTapPos.x,
            touch.clientY - lastEmptyTapPos.y
          ) < 40;

        if (now - lastEmptyTapTime <= 300 && isCloseToLastTap) {
          resetCamera();
          lastEmptyTapTime = 0;
          lastEmptyTapPos = null;
        } else {
          lastEmptyTapTime = now;
          lastEmptyTapPos = { x: touch.clientX, y: touch.clientY };
        }
      }
    }

    touchMode = null;
    touchStartPos = null;
    touchMidpoint = null;
    touchDistance = 0;
    touchGestureHadMultipleFingers = false;
    isDragging = false;
  }

  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  touchMode = null;
  touchStartPos = null;
  touchMidpoint = null;
  touchDistance = 0;
  touchHasMoved = true;
  touchGestureHadMultipleFingers = false;
  isDragging = false;
  e.preventDefault();
});

// ==================== INFO PANEL ====================
function showPlanetInfo(planet) {
  const panel = infoPanel;
  document.getElementById('infoName').innerHTML =
    `<span class="planet-dot" style="background:${planet.color};color:${planet.color}"></span>${planet.name}`;
  document.getElementById('infoDiameter').textContent = planet.diameter;
  document.getElementById('infoDistance').textContent = planet.distance;
  document.getElementById('infoPeriod').textContent = planet.period;
  document.getElementById('infoType').textContent = planet.type;

  const moonDefs = MOON_SYSTEMS[planet.name];
  if (moonDefs && moonDefs.length > 0) {
    const moonNames = moonDefs.map(m => `${m.name}${m.periodDays < 0 ? ' (retro)' : ''}`).join(', ');
    document.getElementById('infoMoons').textContent = moonNames;
    document.getElementById('infoMoons').closest('.stat').style.display = '';
  } else {
    document.getElementById('infoMoons').textContent = '—';
    document.getElementById('infoMoons').closest('.stat').style.display = 'none';
  }

  // Clamp position to viewport
  let px = planet._screenX;
  let py = planet._screenY - planet._screenR - 20;
  px = Math.max(140, Math.min(canvas.width - 140, px));
  py = Math.max(90, Math.min(canvas.height - 220, py));

  panel.style.left = px + 'px';
  panel.style.top = py + 'px';
  panel.classList.add('visible');
}

function hidePlanetInfo() {
  infoPanel.classList.remove('visible');
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) animate.lastTime = null;
});

// ==================== CONTROLS ====================
nowBtn.addEventListener('click', () => {
  liveMode = true;
  simTime = Date.now();
  speedSlider.value = 100;
  speedValueEl.textContent = 'LIVE';
  timeLabelEl.textContent = new Date().toLocaleString();
  nowBtn.classList.add('active');
  pauseBtn.classList.remove('active');
  playBtn.classList.remove('active');
});

pauseBtn.addEventListener('click', () => {
  liveMode = false;
  isPaused = true;
  speedValueEl.textContent = 'PAUSED';
  timeLabelEl.textContent = formatSimTime(simTime);
  pauseBtn.classList.add('active');
  nowBtn.classList.remove('active');
  playBtn.classList.remove('active');
});

playBtn.addEventListener('click', () => {
  liveMode = false;
  isPaused = false;
  playBtn.classList.add('active');
  nowBtn.classList.remove('active');
  pauseBtn.classList.remove('active');
});

speedSlider.addEventListener('input', () => {
  const rawSpeed = parseFloat(speedSlider.value);
  simSpeed = Math.max(0, rawSpeed / 100);
  if (simSpeed > 1.001) {
    liveMode = false;
    nowBtn.classList.remove('active');
    if (simSpeed > 0) {
      playBtn.classList.add('active');
      pauseBtn.classList.remove('active');
    }
  }
});

// ==================== START ====================
requestAnimationFrame(animate);
</script>
